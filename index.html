<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Academy</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100 flex h-screen">

<!-- SIDEBAR -->
<aside class="w-72 bg-white border-r p-5 flex flex-col">
    <h1 class="text-xl font-bold mb-6">HR Academy</h1>

    <nav class="flex flex-col gap-2 text-sm">

        <button onclick="openView('dashboard')">Dashboard</button>

        <p class="mt-4 text-xs text-gray-400">PROGRAM</p>
        <button onclick="openView('onboarding')">Onboarding Training</button>
        <button onclick="openView('mandatory')">Mandatory Training</button>
        <button onclick="openView('request')">Training by Request</button>
        <button onclick="openView('tna')">Training by TNA</button>
        <button onclick="openView('leadership')">Leadership Development</button>

        <p class="mt-4 text-xs text-gray-400">JADWAL</p>
        <button onclick="openView('jadwal_training')">Jadwal Training</button>
        <button onclick="openView('jadwal_genba')">Jadwal Genba</button>

        <button class="mt-4" onclick="openView('performance')">Performance Management</button>

    </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col">
<header class="bg-white border-b p-4 font-bold" id="title">Dashboard</header>
<div id="content" class="p-6 overflow-auto"></div>
</main>

<script>

// ================= API =================
const API_URL = "https://script.google.com/macros/s/AKfycbwq-wVNNlqiMoCdvBsuxDc1A9EWWrD58t2Qa0B_wNONRv88WmZGJHFrU-ZoMq8TONvPgQ/exec";

let programsData = {};
let schedulesData = {};
let performanceData = [];

async function loadAPI(){
    try{
        const res = await fetch(API_URL);
        const data = await res.json();

        programsData = data.programs || {};
        schedulesData = data.schedules || {};
        performanceData = data.performance || [];

        console.log("API OK:", data);

    }catch(err){
        console.error("API ERROR:", err);
    }
}

// ================= VIEW =================
function openView(view){

    document.getElementById("title").innerText = view.toUpperCase();
    const content = document.getElementById("content");

    if(view === "dashboard"){
        content.innerHTML = `
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white p-5 rounded-xl">Onboarding: ${(programsData.onboarding||[]).length}</div>
            <div class="bg-white p-5 rounded-xl">Mandatory: ${(programsData.mandatory||[]).length}</div>
            <div class="bg-white p-5 rounded-xl">TNA: ${(programsData.tna||[]).length}</div>
        </div>`;
        return;
    }

    if(view === "onboarding") return renderTable(programsData.onboarding);
    if(view === "mandatory") return renderTable(programsData.mandatory);
    if(view === "request") return renderTable(programsData.request);
    if(view === "tna") return renderTable(programsData.tna);
    if(view === "leadership") return renderTable(programsData.leadership);

    if(view === "jadwal_training") return renderTable(schedulesData.training);
    if(view === "jadwal_genba") return renderTable(schedulesData.genba);

    if(view === "performance") return renderTable(performanceData);
}

// ================= TABLE =================
function renderTable(data){

    if(!data || !data.length){
        document.getElementById("content").innerHTML = "No Data";
        return;
    }

    const headers = Object.keys(data[0]);

    let html = `<table class="w-full bg-white rounded-xl text-sm">
    <thead class="bg-gray-100"><tr>`;

    headers.forEach(h => html += `<th class="p-3 text-left">${h}</th>`);

    html += `</tr></thead><tbody>`;

    data.forEach(row => {
        html += `<tr class="border-t">`;
        headers.forEach(h => html += `<td class="p-3">${row[h]}</td>`);
        html += `</tr>`;
    });

    html += `</tbody></table>`;

    document.getElementById("content").innerHTML = html;
}

// INIT
window.onload = async function(){
    await loadAPI();
    openView('dashboard');
    lucide.createIcons();
}

</script>

</body>
</html>
