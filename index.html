<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Academy - Monitoring & Evaluasi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .active-menu { background-color: #2563eb; color: white; }
    .loader { border-top-color: #2563eb; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 flex overflow-hidden h-screen">

  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-gray-200 transition-transform duration-300 transform lg:translate-x-0 lg:static lg:inset-0 shadow-sm overflow-y-auto">
    <div class="p-6">
      <div class="flex items-center gap-3 mb-10 px-2">
        <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200">
          <i data-lucide="graduation-cap"></i>
        </div>
        <h1 class="text-xl font-bold text-slate-800 tracking-tight">HR Academy</h1>
      </div>

      <nav class="space-y-6">
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest px-4 mb-3">Program & Data</p>
          <div class="space-y-1">
            <button onclick="switchTab('Data Karyawan')" class="menu-item active-menu w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium">
              <i data-lucide="users" class="w-5"></i> Data Karyawan
            </button>
            <button onclick="switchTab('Data Matrix Materi Training')" class="menu-item w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all font-medium">
              <i data-lucide="book-open" class="w-5"></i> Matrix Training
            </button>
            <button onclick="switchTab('Data Penyelesaian Training')" class="menu-item w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all font-medium">
              <i data-lucide="check-circle" class="w-5"></i> Penyelesaian
            </button>
            <button onclick="switchTab('Performance')" class="menu-item w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all font-medium">
              <i data-lucide="bar-chart-3" class="w-5"></i> Performance
            </button>
          </div>
        </div>

        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest px-4 mb-3">Jadwal & Agenda</p>
          <div class="space-y-1">
            <button onclick="switchTab('Jadwal Training')" class="menu-item w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all font-medium">
              <i data-lucide="calendar" class="w-5"></i> Jadwal Training
            </button>
            <button onclick="switchTab('Jadwal Genba')" class="menu-item w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all font-medium">
              <i data-lucide="map" class="w-5"></i> Jadwal Genba
            </button>
          </div>
        </div>
      </nav>
    </div>

    <div class="absolute bottom-0 w-full p-6 border-t border-slate-100 bg-slate-50/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">HR</div>
        <div>
          <p class="text-sm font-bold text-slate-800">Admin HR</p>
          <p class="text-[10px] text-slate-500 uppercase tracking-wider">Learning & Development</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm">
      <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg">
          <i data-lucide="menu"></i>
        </button>
        <h2 id="current-title" class="text-lg font-bold text-slate-800 uppercase tracking-tight">Data Karyawan</h2>
      </div>
      <div class="flex gap-3">
         <button onclick="openUploadModal()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-md shadow-green-100">
           <i data-lucide="file-up" class="w-4"></i> Upload Excel
         </button>
         <button onclick="openAddModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-md shadow-blue-100">
           <i data-lucide="plus" class="w-4"></i> Tambah Data
         </button>
      </div>
    </header>

    <section class="flex-1 overflow-auto p-8" id="main-content">
      <div id="loading-state" class="hidden flex flex-col items-center justify-center h-full">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-slate-500 font-medium">Sedang mengambil data...</p>
      </div>

      <div id="table-wrapper" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead id="table-head" class="bg-slate-50 border-b border-gray-200"></thead>
          <tbody id="table-body" class="divide-y divide-gray-100 text-slate-600"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="uploadModal" class="hidden fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold text-slate-800">Bulk Import Excel</h3>
        <button onclick="closeModal('uploadModal')" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
      </div>
      <div class="space-y-4">
        <div class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center bg-slate-50">
          <input type="file" id="excelFile" class="hidden" accept=".xlsx, .xls">
          <label for="excelFile" class="cursor-pointer">
            <i data-lucide="upload-cloud" class="w-12 h-12 text-blue-500 mx-auto mb-4"></i>
            <p class="text-sm font-medium text-slate-700">Klik untuk upload file Excel</p>
            <p class="text-xs text-slate-400 mt-1">Hanya mendukung format .xlsx</p>
          </label>
        </div>
        <button onclick="handleExcelUpload()" id="btnDoUpload" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Proses & Simpan</button>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    let currentSheet = 'Data Karyawan';

    // Inisialisasi awal
    window.onload = () => { loadSheetData(currentSheet); };

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
    }

    function switchTab(sheetName) {
      currentSheet = sheetName;
      document.getElementById('current-title').innerText = sheetName;
      
      // Update Menu UI
      document.querySelectorAll('.menu-item').forEach(btn => {
        btn.classList.remove('active-menu');
        if(btn.innerText.includes(sheetName) || sheetName.includes(btn.innerText)) btn.classList.add('active-menu');
      });

      loadSheetData(sheetName);
    }

    function loadSheetData(sheetName) {
      const wrapper = document.getElementById('table-wrapper');
      const loader = document.getElementById('loading-state');
      wrapper.classList.add('hidden');
      loader.classList.remove('hidden');

      google.script.run
        .withSuccessHandler(response => {
          renderTable(response);
          loader.classList.add('hidden');
          wrapper.classList.remove('hidden');
        })
        .readDataSheet(sheetName);
    }

    function renderTable(res) {
      const head = document.getElementById('table-head');
      const body = document.getElementById('table-body');
      
      // Header
      let headHtml = '<tr>';
      res.headers.forEach(h => headHtml += `<th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">${h}</th>`);
      headHtml += '<th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Aksi</th></tr>';
      head.innerHTML = headHtml;

      // Body
      let bodyHtml = '';
      res.data.forEach((row, rowIndex) => {
        bodyHtml += `<tr class="hover:bg-slate-50 transition">`;
        row.forEach(cell => bodyHtml += `<td class="px-6 py-4 text-sm">${cell || '-'}</td>`);
        bodyHtml += `
          <td class="px-6 py-4 text-center space-x-2">
            <button onclick="editRow(${rowIndex})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
            <button onclick="deleteRow(${rowIndex})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </td>
        </tr>`;
      });
      body.innerHTML = bodyHtml;
      lucide.createIcons();
    }

    // FUNGSI UPLOAD EXCEL
    function openUploadModal() { document.getElementById('uploadModal').classList.remove('hidden'); }
    function closeModal(id) { document.getElementById('uploadModal').classList.add('hidden'); }

    function handleExcelUpload() {
      const fileInput = document.getElementById('excelFile');
      const btn = document.getElementById('btnDoUpload');
      if (!fileInput.files[0]) return alert('Pilih file dulu!');

      btn.disabled = true;
      btn.innerText = 'Memproses...';

      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, range: 1});

        google.script.run
          .withSuccessHandler(res => {
            alert(res);
            closeModal('uploadModal');
            loadSheetData(currentSheet);
            btn.disabled = false;
            btn.innerText = 'Proses & Simpan';
          })
          .importExcelDinamis(rawData, currentSheet);
      };
      reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function deleteRow(index) {
      if(confirm('Yakin mau hapus data ini?')) {
        google.script.run.withSuccessHandler(res => {
          alert(res);
          loadSheetData(currentSheet);
        }).deleteRowData(currentSheet, index);
      }
    }

    // Edit & Add (Bisa dikembangkan dengan modal form dinamis)
    function editRow(index) {
      alert('Fitur Edit Row ' + index + ' sedang disiapkan. Data akan ditarik ke form otomatis.');
    }

    function openAddModal() {
      alert('Silahkan gunakan form input manual yang akan muncul sesuai sheet ' + currentSheet);
    }
  </script>
</body>
</html>
