<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyAAg-Zc18aIFJw1S0SewXHhTgINrEuA65i8rdH3lwSp6PoVEvMH2zC7R3Lvz1ODAIGhg/exec";

// =========================
// SIDEBAR
// =========================

function toggleSidebar(){

document
.getElementById("sidebar")
.classList.toggle("-translate-x-full");

document
.getElementById("overlay")
.classList.toggle("hidden");

}

// AUTO OPEN MOBILE

window.onload=()=>{

if(window.innerWidth<768){

toggleSidebar();

}

loadDivisions();
loadDepartments();
loadDashboard();

};

// =========================
// SWITCH MENU
// =========================

function showMenu(name){

document
.querySelectorAll(".view")
.forEach(v=>v.classList.add("hidden"));

document
.getElementById(
"view-"+name
).classList.remove("hidden");

// AUTO LOAD

if(name=="onboarding"){

loadOnboarding();

}

}

// =========================
// LOAD DIVISI
// =========================

async function loadDivisions(){

const res =
await fetch(
API_URL+"?action=getDivisions"
);

const data =
await res.json();

let html =
"<option>Semua Divisi</option>";

data.forEach(d=>{

html+=
`<option>${d}</option>`;

});

document
.getElementById("divisiFilter")
.innerHTML=html;

}

// =========================
// LOAD DEPARTMENT
// =========================

async function loadDepartments(){

const res =
await fetch(
API_URL+"?action=getDepartments"
);

const data =
await res.json();

let html =
"<option>Semua Departement</option>";

data.forEach(d=>{

html+=
`<option>${d}</option>`;

});

document
.getElementById("deptFilter")
.innerHTML=html;

}

// =========================
// DASHBOARD LOAD
// =========================

async function loadDashboard(){

const res =
await fetch(
API_URL+"?action=getSheetData&sheet=Data Karyawan"
);

const data =
await res.json();

document
.getElementById("totalKaryawan")
.innerText =
data.length;

}

</script>
  
<script>
async function loadDashboard(){

// =====================
// LOAD DATA

const karyawan =
await fetch(
API_URL+
"?action=getSheetData&sheet=Data Karyawan"
).then(r=>r.json());

const penyelesaian =
await fetch(
API_URL+
"?action=getSheetData&sheet=Data Penyelesaian Training"
).then(r=>r.json());

const matrix =
await fetch(
API_URL+
"?action=getSheetData&sheet=Data Matrix Materi Training"
).then(r=>r.json());

// =====================
// KPI

document
.getElementById("totalKaryawan")
.innerText =
karyawan.length;

document
.getElementById("totalTraining")
.innerText =
penyelesaian.length;

// =====================
// STATUS

let completed =
penyelesaian.filter(d=>
d.Status=="Completed"
).length;

let progress =
penyelesaian.filter(d=>
d.Status!="Completed"
).length;

document
.getElementById("totalCompleted")
.innerText =
completed;

document
.getElementById("totalProgress")
.innerText =
progress;

// =====================
// MAP TRAINING → MATRIX

let kategoriMap={};

matrix.forEach(m=>{

kategoriMap[
m["Judul Materi Training"]
]=
m["Kategori Training"];

});

// =====================
// CHART PER DIVISI

let divisiCount={};

penyelesaian.forEach(p=>{

let div =
p.Departement;

if(!divisiCount[div])
divisiCount[div]=0;

divisiCount[div]++;

});

new Chart(
document
.getElementById("chartDivisi"),
{

type:"bar",

data:{

labels:
Object.keys(divisiCount),

datasets:[{

label:
"Training per Divisi",

data:
Object.values(divisiCount)

}]

}

});

// =====================
// CHART KATEGORI

let kategoriCount={};

penyelesaian.forEach(p=>{

let kategori =
kategoriMap[p.Training]
|| "Unknown";

if(!kategoriCount[kategori])
kategoriCount[kategori]=0;

kategoriCount[kategori]++;

});

new Chart(
document
.getElementById("chartKategori"),
{

type:"doughnut",

data:{

labels:
Object.keys(kategoriCount),

datasets:[{

data:
Object.values(kategoriCount)

}]

}

});

}  
</script>  
  
<script> 
// =============================
// LOAD ONBOARDING DATA
// =============================

// =============================
// LOAD ONBOARDING (REAL LOGIC)
// =============================

async function loadOnboarding(){

// ======================
// LOAD DATA

const penyelesaian =
await fetch(
API_URL+
"?action=getSheetData&sheet=Data Penyelesaian Training"
).then(r=>r.json());

const matrix =
await fetch(
API_URL+
"?action=getSheetData&sheet=Data Matrix Materi Training"
).then(r=>r.json());

// ======================
// FILTER MATRIX ONBOARDING

const onboardingMateri =
matrix.filter(m=>

m["Kategori Training"]
==
"Onboarding Training"

);

// ======================
// TOTAL MATERI

let totalMateri =
onboardingMateri.length;

document
.getElementById("onbTotalMateri")
.innerText =
totalMateri;

// ======================
// HITUNG LULUS

let lulusCount=0;

let html="";

onboardingMateri.forEach(m=>{

let materiName =
m["Judul Materi Training"];

// cari LULUS

let lulus =
penyelesaian.filter(p=>

p.Training
==
materiName

&&
p.Status
==
"LULUS"

);

// ======================
// HITUNG PROGRESS

if(lulus.length>0)
lulusCount++;

// ======================
// STATUS CARD

let statusText =
lulus.length>0
? "✅ LULUS"
: "⏳ Belum Lulus";

// ======================
// CARD

html+=`

<div class="card">

<h3 class="font-bold">

${materiName}

</h3>

<p class="text-sm opacity-70">

Departemen:
${m.Departemen}

</p>

<p class="mt-2">

Status:
${statusText}

</p>

</div>

`;

});

// ======================
// SET KPI

document
.getElementById("onbCompleted")
.innerText =
lulusCount;

// ======================
// HITUNG %

let percent =
Math.round(
(lulusCount / totalMateri)
*100
);

document
.getElementById("onbProgress")
.innerText =
percent+"%";

// ======================
// RENDER LIST

document
.getElementById(
"onboardingList"
).innerHTML =
html;

}
  
</script>
</body>

</html>
