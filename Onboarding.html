
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        icons: { [name]: window.lucide.icons[name] }
                    });
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [tableData, setTableData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            
            // Set default filter to current month
            const currentMonth = new Date().getMonth();
            const [filterPeriode, setFilterPeriode] = useState(String(currentMonth)); 
            
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [filterDivisi, setFilterDivisi] = useState('');
            const [filterLevel, setFilterLevel] = useState('');
            const [filterDept, setFilterDept] = useState('');

            const [selectedDetail, setSelectedDetail] = useState(null);

            const SPREADSHEET_URL = "https://script.google.com/macros/s/AKfycbzQ_26DnGGsP2oEiHqAf470AeV_7jqo-jKJ8EXvBE2CxMhtWPJpSJYNQJ3rkeMSgIUW9A/exec";

            const monthOptions = [
                { value: '0', label: 'Januari 2026' },
                { value: '1', label: 'Februari 2026' },
                { value: '2', label: 'Maret 2026' },
                { value: '3', label: 'April 2026' },
                { value: '4', label: 'Mei 2026' },
                { value: '5', label: 'Juni 2026' },
                { value: '6', label: 'Juli 2026' },
                { value: '7', label: 'Agustus 2026' },
                { value: '8', label: 'September 2026' },
                { value: '9', label: 'Oktober 2026' },
                { value: '10', label: 'November 2026' },
                { value: '11', label: 'Desember 2026' }
            ];

            useEffect(() => {
                fetch(SPREADSHEET_URL)
                    .then(res => res.json())
                    .then(data => {
                        const formatted = data.map((item, idx) => ({
                            no: idx + 1,
                            namaKaryawan: item.namakaryawan || "-",
                            username: item.username || "-",
                            divisi: item.divisi || "-",
                            departement: item.departement || "-",
                            jabatan: item.jabatan || "-",
                            levelJabatan: item.leveljabatan || "-",
                            tanggalJoin: item.tanggaljoin || "-",
                            statusOnboarding: item.statusonboarding || "Pending",
                            temuanSLA: item.temuansla || "Oke",
                            userAtasan: item.useratasan || "-",
                            picRecruitment: item.picrecruitment || item.pic || item.pic_recruitment || "-",
                            statusTerakhir: item.statusterakhir || "-"
                        }));
                        setTableData(formatted);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Error fetch data:", err);
                        setLoading(false);
                    });
            }, []);

            const filteredData = useMemo(() => {
                return tableData.filter(d => {
                    const matchSearch = searchTerm === '' || Object.values(d).some(v => 
                        String(v).toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    
                    const matchDivisi = filterDivisi === '' || String(d.divisi).trim() === String(filterDivisi).trim();
                    const matchLevel = filterLevel === '' || String(d.levelJabatan).trim() === String(filterLevel).trim();
                    const matchDept = filterDept === '' || String(d.departement).trim() === String(filterDept).trim();
                    
                    let matchPeriode = true;
                    const joinDate = new Date(d.tanggalJoin);
                    const isValidDate = !isNaN(joinDate.getTime());

                    if (filterPeriode === 'custom') {
                        if (!isValidDate || !startDate || !endDate) {
                            matchPeriode = true;
                        } else {
                            const start = new Date(startDate);
                            const end = new Date(endDate);
                            end.setHours(23, 59, 59);
                            matchPeriode = joinDate >= start && joinDate <= end;
                        }
                    } else if (filterPeriode === 'all') {
                        matchPeriode = true;
                    } else {
                        if (!isValidDate) return false;
                        const targetMonth = parseInt(filterPeriode);
                        matchPeriode = joinDate.getMonth() === targetMonth && joinDate.getFullYear() === 2026;
                    }

                    return matchSearch && matchDivisi && matchLevel && matchDept && matchPeriode;
                });
            }, [searchTerm, tableData, filterDivisi, filterLevel, filterDept, filterPeriode, startDate, endDate]);

            const stats = useMemo(() => {
                const dataSet = filteredData;
                const totalFiltered = dataSet.length;
                
                if (totalFiltered === 0) return { totalRec: 0, total: 0, completed: 0, progress: 0, pending: 0, notJoin: 0, percComp: 0, percProg: 0, percPending: 0, slaIssues: [], funnel: [] };

                const notJoinCount = dataSet.filter(d => String(d.statusOnboarding).toLowerCase() === 'not join').length;
                const activeParticipants = totalFiltered - notJoinCount;

                const completedCount = dataSet.filter(d => String(d.statusOnboarding).toLowerCase().includes('complet')).length;
                const inProgressCount = dataSet.filter(d => String(d.statusOnboarding).toLowerCase().includes('progres')).length;
                const notStartedCount = dataSet.filter(d => String(d.statusOnboarding).toLowerCase().includes('not started')).length;

                const percComp = activeParticipants > 0 ? ((completedCount / activeParticipants) * 100).toFixed(1) : 0;
                const percProg = activeParticipants > 0 ? ((inProgressCount / activeParticipants) * 100).toFixed(1) : 0;
                const percPending = activeParticipants > 0 ? ((notStartedCount / activeParticipants) * 100).toFixed(1) : 0;

                const countSLA = (keyword) => dataSet.filter(d => d.temuanSLA && String(d.temuanSLA).toLowerCase().includes(keyword.toLowerCase())).length;

                const slaIssues = [
                    { label: 'Training In Class', val: countSLA('Training In Class'), key: 'Training In Class' },
                    { label: 'Assignment', val: countSLA('Assignment'), key: 'Assignment' },
                    { label: 'Serah Terima User', val: countSLA('Serah Terima'), key: 'Serah Terima' },
                    { label: 'Onboarding Completed', val: countSLA('On Boarding Comp'), key: 'On Boarding Comp' }
                ];

                return { 
                    totalRec: totalFiltered,
                    total: activeParticipants,
                    completed: completedCount, 
                    progress: inProgressCount, 
                    pending: notStartedCount, 
                    notJoin: notJoinCount,
                    percComp, percProg, percPending, slaIssues,
                    funnel: [
                        { label: 'List Recruitment', val: totalFiltered, topW: '100%', botW: '85%', color: 'bg-blue-600', filter: 'total_rec' },
                        { label: 'Training Class', val: activeParticipants, topW: '85%', botW: '70%', color: 'bg-blue-500', filter: 'training' },
                        { label: 'Assignment', val: dataSet.filter(d => /assignment|complet/i.test(d.statusOnboarding)).length, topW: '70%', botW: '55%', color: 'bg-blue-400', filter: 'assignment' },
                        { label: 'Serah Terima User', val: dataSet.filter(d => /serah|complet/i.test(d.statusOnboarding)).length, topW: '55%', botW: '40%', color: 'bg-blue-300 text-blue-900', filter: 'serah' },
                        { label: 'Onboarding Completed', val: completedCount, topW: '40%', botW: '25%', color: 'bg-blue-200 text-blue-800', filter: 'completed' }
                    ]
                };
            }, [filteredData]);

            const needleRotation = (stats.percComp / 100 * 180) - 90;
            const fillRotation = (stats.percComp / 100 * 180) - 45;

            const uniqueValues = (key) => [...new Set(tableData.map(d => String(d[key]).trim()))].filter(v => v && v !== "-").sort();

            const handleExport = () => {
                const worksheet = XLSX.utils.json_to_sheet(filteredData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "OnboardingData");
                XLSX.writeFile(workbook, `Trusmiverse_Onboarding_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const openDetail = (type, extra = "") => {
                let data = [];
                let title = "";
                
                if (type === 'total_rec') { data = filteredData; title = "Total Kandidat Join (All)"; }
                else if (type === 'total') { data = filteredData.filter(d => String(d.statusOnboarding).toLowerCase() !== 'not join'); title = "Total Peserta Aktif"; }
                else if (type === 'completed') { data = filteredData.filter(d => String(d.statusOnboarding).toLowerCase().includes('complet')); title = "Peserta Completed"; }
                else if (type === 'progress') { data = filteredData.filter(d => String(d.statusOnboarding).toLowerCase().includes('progres')); title = "Peserta In Progress"; }
                else if (type === 'pending') { data = filteredData.filter(d => String(d.statusOnboarding).toLowerCase().includes('not started')); title = "Peserta Not Started"; }
                else if (type === 'not_join') { data = filteredData.filter(d => String(d.statusOnboarding).toLowerCase() === 'not join'); title = "Peserta Not Join"; }
                else if (type === 'training') { data = filteredData.filter(d => String(d.statusOnboarding).toLowerCase() !== 'not join'); title = "Peserta di Tahap Training Class"; }
                else if (type === 'assignment') { data = filteredData.filter(d => /assignment|complet/i.test(d.statusOnboarding)); title = "Peserta di Tahap Assignment"; }
                else if (type === 'serah') { data = filteredData.filter(d => /serah|complet/i.test(d.statusOnboarding)); title = "Peserta di Tahap Serah Terima"; }
                else if (type === 'sla') {
                    data = filteredData.filter(d => d.temuanSLA && String(d.temuanSLA).toLowerCase().includes(extra.toLowerCase()));
                    title = `Peserta Lewat SLA: ${extra}`;
                }

                setSelectedDetail({ title, data });
            };

            return (
                <div className="min-h-screen pb-10 relative">
                    {/* Modal Popup */}
                    {selectedDetail && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white rounded-3xl w-[95%] max-w-[95%] max-h-[90vh] flex flex-col shadow-2xl overflow-hidden border">
                                <div className="p-6 border-b flex items-center justify-between bg-white sticky top-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg"><Icon name="list" className="w-5 h-5" /></div>
                                        <h2 className="text-xl font-black text-slate-800 tracking-tight uppercase">{selectedDetail.title}</h2>
                                    </div>
                                    <button onClick={() => setSelectedDetail(null)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                                        <Icon name="x" className="w-6 h-6 text-slate-400" />
                                    </button>
                                </div>
                                <div className="p-4 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse min-w-[1600px]">
                                        <thead className="bg-slate-50 text-[0.6rem] font-black text-slate-400 uppercase tracking-widest sticky top-0 z-10">
                                            <tr>
                                                <th className="px-4 py-3 border-b">Nama</th>
                                                <th className="px-4 py-3 border-b">Username</th>
                                                <th className="px-4 py-3 border-b">Divisi</th>
                                                <th className="px-4 py-3 border-b">Departement</th>
                                                <th className="px-4 py-3 border-b">Jabatan</th>
                                                <th className="px-4 py-3 border-b">Level</th>
                                                <th className="px-4 py-3 border-b">Tanggal Join</th>
                                                <th className="px-4 py-3 border-b">Status Onboarding</th>
                                                <th className="px-4 py-3 border-b">SLA</th>
                                                <th className="px-4 py-3 border-b">User Atasan</th>
                                                <th className="px-4 py-3 border-b">PIC Recruitment</th>
                                                <th className="px-4 py-3 border-b">Status Terakhir</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-[0.7rem]">
                                            {selectedDetail.data.length > 0 ? selectedDetail.data.map((d, i) => (
                                                <tr key={i} className="border-b hover:bg-blue-50/50">
                                                    <td className="px-4 py-3 font-black text-blue-900 uppercase">{d.namaKaryawan}</td>
                                                    <td className="px-4 py-3 text-slate-400 font-mono">{d.username}</td>
                                                    <td className="px-4 py-3 text-slate-500">{d.divisi}</td>
                                                    <td className="px-4 py-3 text-slate-400">{d.departement}</td>
                                                    <td className="px-4 py-3 text-slate-600 font-bold italic">{d.jabatan}</td>
                                                    <td className="px-4 py-3 text-slate-500 font-black">{d.levelJabatan}</td>
                                                    <td className="px-4 py-3 text-slate-500 font-mono">{d.tanggalJoin}</td>
                                                    <td className="px-4 py-3 font-black text-blue-600">{d.statusOnboarding}</td>
                                                    <td className={`px-4 py-3 font-bold ${d.temuanSLA !== 'Oke' ? 'text-red-500' : 'text-slate-400'}`}>{d.temuanSLA}</td>
                                                    <td className="px-4 py-3 font-bold text-slate-700">{d.userAtasan}</td>
                                                    <td className="px-4 py-3 text-slate-400 font-black uppercase">{d.picRecruitment}</td>
                                                    <td className="px-4 py-3 font-medium italic text-slate-500">{d.statusTerakhir}</td>
                                                </tr>
                                            )) : (
                                                <tr>
                                                    <td colSpan="12" className="py-10 text-center text-slate-400 font-bold italic">Tidak ada data ditemukan.</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end">
                                    <button onClick={() => setSelectedDetail(null)} className="px-6 py-2 bg-slate-800 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-md">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-white border-b px-6 py-3 flex items-center justify-between sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-red-600 p-1.5 rounded-lg shadow-lg shadow-red-100"><Icon name="layout-dashboard" className="text-white w-5 h-5" /></div>
                            <span className="font-extrabold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600">Onboarding Training</span>
                        </div>
                        
                        <div className="flex flex-col items-end">
                            <div className="text-right">
                                <p className="font-bold text-xs text-slate-700 leading-none">HR Training</p>
                                <p className="text-[0.55rem] text-slate-400 font-black uppercase tracking-widest mt-1">Trusmi Group</p>
                            </div>
                            
                            <div className="mt-2 flex items-center gap-2 bg-slate-100/80 border border-slate-200 p-1 rounded-lg">
                                <div className="flex items-center gap-1">
                                    <select 
                                        className="bg-transparent border-none text-[0.6rem] font-black outline-none text-slate-600 cursor-pointer uppercase tracking-tighter px-1"
                                        value={filterPeriode} 
                                        onChange={(e)=>setFilterPeriode(e.target.value)}
                                    >
                                        <option value="all">Semua Data</option>
                                        {monthOptions.map(m => (
                                            <option key={m.value} value={m.value}>{m.label}</option>
                                        ))}
                                        <option value="custom">Custom Date</option>
                                    </select>
                                </div>
                                
                                {filterPeriode === 'custom' && (
                                    <div className="flex items-center gap-1 border-l border-slate-300 pl-1 animate-fadeIn">
                                        <input 
                                            type="date" 
                                            className="bg-transparent border-none text-[0.6rem] font-bold outline-none text-blue-600"
                                            value={startDate}
                                            onChange={(e) => setStartDate(e.target.value)}
                                        />
                                        <span className="text-[0.5rem] text-slate-400 font-bold uppercase">-</span>
                                        <input 
                                            type="date" 
                                            className="bg-transparent border-none text-[0.6rem] font-bold outline-none text-blue-600"
                                            value={endDate}
                                            onChange={(e) => setEndDate(e.target.value)}
                                        />
                                    </div>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-[1440px] mx-auto p-6 space-y-6">
                        <div className="text-left py-2">
                            <h1 className="text-lg font-black text-slate-800 tracking-wider uppercase italic">DASHBOARD</h1>
                            <div className="h-0.5 w-16 bg-red-600 mt-1 rounded-full"></div>
                        </div>

                        <div className="grid grid-cols-2 lg:grid-cols-6 gap-4">
                            {[
                                { id: 'total_rec', label: 'Kandidat Join', val: stats.totalRec, sub: '(Recruitment)', icon: 'user-plus', color: 'text-indigo-600', borderColor: 'border-l-indigo-600', bgIcon: 'bg-indigo-50' },
                                { id: 'total', label: 'Total Peserta', val: stats.total, sub: '(Aktif)', icon: 'users', color: 'text-blue-600', borderColor: 'border-l-blue-600', bgIcon: 'bg-blue-50' },
                                { id: 'completed', label: 'Completed', val: stats.percComp + '%', sub: `(${stats.completed}/${stats.total})`, icon: 'check-circle', color: 'text-emerald-600', borderColor: 'border-l-emerald-600', bgIcon: 'bg-emerald-50' },
                                { id: 'progress', label: 'In Progress', val: stats.percProg + '%', sub: `(${stats.progress}/${stats.total})`, icon: 'refresh-cw', color: 'text-sky-600', borderColor: 'border-l-sky-600', bgIcon: 'bg-sky-50' },
                                { id: 'pending', label: 'Not Started', val: stats.percPending + '%', sub: `(${stats.pending}/${stats.total})`, icon: 'clock', color: 'text-amber-600', borderColor: 'border-l-amber-600', bgIcon: 'bg-amber-50' },
                                { id: 'not_join', label: 'Not Join', val: stats.notJoin, sub: '(Cancel)', icon: 'user-minus', color: 'text-rose-600', borderColor: 'border-l-rose-600', bgIcon: 'bg-rose-50' },
                            ].map((s, i) => (
                                <div 
                                    key={i} 
                                    onClick={() => openDetail(s.id)}
                                    className={`bg-white p-5 rounded-xl border border-slate-100 shadow-sm transition-all cursor-pointer relative overflow-hidden border-l-4 ${s.borderColor} stat-card`}
                                >
                                    <div className={`absolute -top-1 -right-1 p-3 rounded-bl-2xl ${s.bgIcon} ${s.color} opacity-40`}>
                                        <Icon name={s.icon} className="w-5 h-5" />
                                    </div>
                                    
                                    <div className={`flex items-center gap-2 text-[0.6rem] font-black uppercase tracking-widest mb-2 ${s.color}`}>
                                        <Icon name={s.icon} className="w-3 h-3" /> {s.label}
                                    </div>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-2xl font-black text-slate-800 tracking-tighter">{s.val}</span>
                                        {s.sub && <span className="text-[0.65rem] text-slate-400 font-bold">{s.sub}</span>}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-4 bg-white p-6 rounded-2xl border shadow-sm hover-lift funnel-container overflow-hidden flex flex-col items-center">
                                <h3 className="text-[0.75rem] font-black text-slate-400 uppercase tracking-widest mb-8 text-center italic underline decoration-blue-200 underline-offset-4 w-full">Onboarding Funnel</h3>
                                <div className="flex flex-col items-center gap-1 w-full max-w-[320px]">
                                    {stats.funnel.map((s, i) => {
                                        const topOffset = (100 - parseFloat(s.topW)) / 2;
                                        const botOffset = (100 - parseFloat(s.botW)) / 2;
                                        const clipPath = `polygon(${topOffset}% 0%, ${100 - topOffset}% 0%, ${100 - botOffset}% 100%, ${botOffset}% 100%)`;
                                        return (
                                            <div key={i} className="w-full flex items-center justify-center relative funnel-step" onClick={() => openDetail(s.filter)}>
                                                <div className={`min-h-[50px] py-1 ${s.color} shadow-sm w-full relative overflow-hidden flex items-center justify-center text-white font-extrabold uppercase`} style={{ clipPath }}>
                                                    <div className="flex flex-col items-center justify-center gap-0 w-full px-2 text-center">
                                                        <span className="text-[0.5rem] md:text-[0.55rem] opacity-90 leading-tight tracking-tight drop-shadow-md">{s.label}</span>
                                                        <span className="text-[0.7rem] font-black leading-none drop-shadow-lg">{s.val}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="lg:col-span-4 bg-white p-6 rounded-2xl border shadow-sm flex flex-col items-center justify-center hover-lift overflow-hidden">
                                <h3 className="text-[0.75rem] font-black text-slate-400 uppercase tracking-widest self-start mb-4">Completion Rate</h3>
                                <div className="gauge-container" onClick={() => openDetail('completed')}>
                                    <div className="gauge-bg"></div>
                                    <div className="gauge-fill" style={{ '--fill-rotation': `${fillRotation}deg` }}></div>
                                    <div className="gauge-needle" style={{ '--needle-rotation': `${needleRotation}deg` }}></div>
                                    <div className="gauge-center"></div>
                                    <div className="absolute inset-x-0 bottom-2 text-center">
                                        <div className="text-3xl font-black text-slate-900 tracking-tighter">{stats.percComp}%</div>
                                        <p className="text-[0.55rem] font-black text-emerald-500 uppercase tracking-widest mt-1">Efficiency Rate</p>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-4 bg-white p-6 rounded-2xl border shadow-sm hover-lift flex flex-col items-center overflow-hidden">
                                <h3 className="text-[0.75rem] font-black text-slate-400 uppercase tracking-widest mb-6 text-center italic underline decoration-blue-200 underline-offset-4 w-full">Activity Lewat SLA</h3>
                                <div className="relative h-44 border-l-2 border-b-2 border-slate-100 ml-4 flex items-end justify-around pb-2 w-[90%] mx-auto">
                                    {stats.slaIssues.map((d, i) => (
                                        <div key={i} className="flex flex-col items-center group relative h-full justify-end px-1 bar-pink flex-1">
                                            <div className="mb-1 text-[0.7rem] font-black text-pink-600 bg-pink-50 px-1 rounded-md border border-pink-100 group-hover:scale-125 transition-transform">{d.val}</div>
                                            <div className="bar-3d-wrapper" onClick={() => openDetail('sla', d.key)}>
                                                <div className="bar-3d-box" style={{ 
                                                    height: d.val === 0 ? '4px' : `${Math.min((d.val / (Math.max(...stats.slaIssues.map(v=>v.val)) || 1)) * 80, 80)}%`
                                                }}></div>
                                            </div>
                                            <span className="text-[0.4rem] font-black text-slate-400 uppercase mt-2 text-center leading-tight h-8 flex items-center">{d.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                            <div className="p-3 border-b flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <div className="p-1.5 bg-blue-50 rounded-lg text-blue-600">
                                        <Icon name="list-checks" className="w-3.5 h-3.5" />
                                    </div>
                                    <div>
                                        <h2 className="font-extrabold text-[0.75rem] uppercase tracking-tight">Onboarding Tracker</h2>
                                        <p className="text-[0.55rem] text-slate-400 font-bold uppercase tracking-widest">Total: {filteredData.length}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-50/50 p-2 border-b">
                                <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar whitespace-nowrap">
                                    <div className="relative w-[220px]">
                                        <Icon name="search" className="w-3 h-3 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input 
                                            type="text" 
                                            placeholder="Cari Nama..." 
                                            value={searchTerm} 
                                            onChange={(e) => setSearchTerm(e.target.value)} 
                                            className="w-full pl-7 pr-2 py-1 border border-slate-200 bg-white rounded-lg text-[0.6rem] outline-none focus:ring-1 focus:ring-blue-400" 
                                        />
                                    </div>
                                    
                                    <div className="w-[130px]">
                                        <select 
                                            className="w-full px-2 py-1 bg-white border border-slate-200 rounded-lg text-[0.6rem] font-bold text-slate-600 outline-none" 
                                            value={filterDivisi} 
                                            onChange={(e)=>setFilterDivisi(e.target.value)}
                                        >
                                            <option value="">Divisi: Semua</option>
                                            {uniqueValues('divisi').map(v => <option key={v} value={v}>{v}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div className="w-[130px]">
                                        <select 
                                            className="w-full px-2 py-1 bg-white border border-slate-200 rounded-lg text-[0.6rem] font-bold text-slate-600 outline-none" 
                                            value={filterDept} 
                                            onChange={(e)=>setFilterDept(e.target.value)}
                                        >
                                            <option value="">Dept: Semua</option>
                                            {uniqueValues('departement').map(v => <option key={v} value={v}>{v}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div className="w-[130px]">
                                        <select 
                                            className="w-full px-2 py-1 bg-white border border-slate-200 rounded-lg text-[0.6rem] font-bold text-slate-600 outline-none" 
                                            value={filterLevel} 
                                            onChange={(e)=>setFilterLevel(e.target.value)}
                                        >
                                            <option value="">Level: Semua</option>
                                            {uniqueValues('levelJabatan').map(v => <option key={v} value={v}>{v}</option>)}
                                        </select>
                                    </div>
                                    
                                    <button 
                                        onClick={handleExport} 
                                        className="flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1 rounded-lg text-[0.55rem] font-black uppercase tracking-wider shadow-sm transition-all active:scale-95 ml-auto"
                                    >
                                        <Icon name="file-spreadsheet" className="w-3 h-3" /> Export
                                    </button>
                                </div>
                            </div>

                            <div className="relative overflow-hidden bg-white">
                                <div className="max-h-[500px] overflow-auto custom-scrollbar">
                                    <table className="w-full text-left table-auto min-w-[1600px]">
                                        <thead className="sticky top-0 z-20 bg-slate-50">
                                            <tr className="text-[0.5625rem] font-black uppercase text-slate-500 border-b">
                                                <th className="px-4 py-4 bg-slate-50">NO</th>
                                                <th className="px-4 py-4 bg-slate-50 sticky left-0 z-30 border-r shadow-sm">NAMA KARYAWAN</th>
                                                <th className="px-4 py-4">USERNAME</th>
                                                <th className="px-4 py-4 text-center">DIVISI</th>
                                                <th className="px-4 py-4">DEPARTEMENT</th>
                                                <th className="px-4 py-4">JABATAN</th>
                                                <th className="px-4 py-4">LEVEL</th>
                                                <th className="px-4 py-4">TANGGAL JOIN</th>
                                                <th className="px-4 py-4">STATUS ONBOARDING</th>
                                                <th className="px-4 py-4">TEMUAN SLA</th>
                                                <th className="px-4 py-4">USER ATASAN</th>
                                                <th className="px-4 py-4">PIC RECRUITMENT</th>
                                                <th className="px-4 py-4">STATUS TERAKHIR</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-[0.6875rem]">
                                            {loading ? (
                                                <tr><td colSpan="13" className="text-center py-20 font-bold text-slate-400 animate-pulse uppercase tracking-widest">SINKRONISASI DATABASE TRUSMIVERSE...</td></tr>
                                            ) : filteredData.length === 0 ? (
                                                <tr><td colSpan="13" className="text-center py-20 font-bold text-slate-400 italic">Data tidak ditemukan untuk periode ini.</td></tr>
                                            ) : filteredData.map((row, i) => (
                                                <tr key={i} className="hover:bg-blue-50/40 transition-all group">
                                                    <td className="px-4 py-4 font-bold text-slate-300">{row.no}</td>
                                                    <td className="px-4 py-4 font-black text-blue-900 sticky left-0 z-10 bg-white group-hover:bg-blue-50 transition-colors border-r shadow-sm uppercase">{row.namaKaryawan}</td>
                                                    <td className="px-4 py-4 font-mono text-slate-400">{row.username}</td>
                                                    <td className="px-4 py-4 text-slate-500 font-medium text-center">{row.divisi}</td>
                                                    <td className="px-4 py-4 text-slate-400">{row.departement}</td>
                                                    <td className="px-4 py-4 text-slate-600 font-bold italic">{row.jabatan}</td>
                                                    <td className="px-4 py-4 text-slate-500 font-black">{row.levelJabatan}</td>
                                                    <td className="px-4 py-4 font-mono text-slate-500">{row.tanggalJoin}</td>
                                                    <td className="px-4 py-4">
                                                        <span className={`px-2 py-0.5 rounded-full font-black text-[0.5rem] uppercase border ${
                                                            String(row.statusOnboarding).toLowerCase().includes('complet') ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 
                                                            String(row.statusOnboarding).toLowerCase().includes('train') ? 'bg-blue-50 text-blue-600 border-blue-100' :
                                                            String(row.statusOnboarding).toLowerCase().includes('not join') ? 'bg-red-50 text-red-600 border-red-100' :
                                                            'bg-amber-50 text-amber-600 border-amber-100'
                                                        }`}>{row.statusOnboarding}</span>
                                                    </td>
                                                    <td className="px-4 py-4 font-bold">
                                                        <span className={row.temuanSLA !== 'Oke' ? 'text-red-500 flex items-center gap-1' : 'text-slate-600'}>
                                                            {row.temuanSLA !== 'Oke' && <Icon name="alert-circle" className="w-3 h-3" />}
                                                            {row.temuanSLA}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-4 font-bold text-slate-700">{row.userAtasan}</td>
                                                    <td className="px-4 py-4 text-slate-400 font-black uppercase text-[0.6rem]">{row.picRecruitment}</td>
                                                    <td className="px-4 py-4 font-medium italic text-slate-500">{row.statusTerakhir}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        if (container) {
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }
    </script>
